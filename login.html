<!DOCTYPE html>
<html>
<head>
  <title>MenuFlow Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/supabaseClient.js"></script>
</head>

<body style="background:#0f172a;color:white;font-family:sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;">

<div style="width:300px;">
  <h1>Login</h1>

  <input id="email" placeholder="Email" style="width:100%;padding:10px;margin-bottom:10px;" />
  <input id="password" type="password" placeholder="Password" style="width:100%;padding:10px;margin-bottom:10px;" />

  <button onclick="login()" style="width:100%;padding:10px;background:#7c3aed;color:white;">Login</button>

  <p id="status"></p>
</div>

<script>
async function login() {
  const { client } = window.MFClient;

  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const { error } = await client.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    document.getElementById('status').innerText = error.message;
  } else {
    window.location.href = '/dashboard/';
  }
}
</script>

</body>
</html>
